name: TestSprite

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  testsprite:
    runs-on: ubuntu-latest
    env:
      TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
      TESTSPRITE_PROJECT_ID: ${{ secrets.TESTSPRITE_PROJECT_ID }}
      TESTSPRITE_TEST_ID: ${{ secrets.TESTSPRITE_TEST_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TestSprite CLI
        run: npm i -g @testsprite/testsprite-cli

      - name: Run TestSprite tests
        run: |
          TEST_ID="$(printf '%s' "$TESTSPRITE_TEST_ID" | tr -d '[:space:]')"
          testsprite test run "$TEST_ID" --wait --output json
