name: TestSprite

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  testsprite:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
      TESTSPRITE_PROJECT_ID: ${{ secrets.TESTSPRITE_PROJECT_ID }}
      TESTSPRITE_TEST_IDS: ${{ secrets.TESTSPRITE_TEST_IDS }}
      TESTSPRITE_TARGET_URL: https://captrix-ai.vercel.app/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TestSprite CLI
        run: npm i -g @testsprite/testsprite-cli

      - name: Wait for deployment warmup
        run: sleep 180

      - name: Run TestSprite tests
        run: |
          set +e

          DEFAULT_TEST_IDS="
          9122d34f-452e-48cf-bc19-e8f26f60b01e
          229c11ab-0fe7-4532-a198-c2780b4108f4
          3f74230a-6c5b-4c80-8f7d-1defe0dd1b48
          1d26dbad-c86f-429c-b913-4fc4efca6a0e
          d37cc1cb-b05a-44d3-b23f-cfd9558dedd6
          85bc8889-c96e-4e9f-956b-634f5390a476
          75d42dd0-e247-4825-ae5c-6157f628ead2
          2f5f2f73-ca90-4e8b-b915-762d60fd70d8
          "

          if [ -n "${TESTSPRITE_TEST_IDS:-}" ]; then
            RAW_TEST_IDS="$TESTSPRITE_TEST_IDS"
          else
            RAW_TEST_IDS="$DEFAULT_TEST_IDS"
          fi

          FAILED=0
          while read -r TEST_ID; do
            TEST_ID="$(printf '%s' "$TEST_ID" | tr -d '[:space:]')"
            [ -z "$TEST_ID" ] && continue

            echo "::group::TestSprite $TEST_ID"
            OUTPUT="$(testsprite test run "$TEST_ID" --target-url "$TESTSPRITE_TARGET_URL" --wait --timeout 1200 --output json 2>&1)"
            CODE=$?
            printf '%s\n' "$OUTPUT"

            if [ "$CODE" -eq 0 ]; then
              echo "TestSprite test passed: $TEST_ID"
            elif [ "$CODE" -eq 7 ]; then
              echo "::warning::TestSprite test $TEST_ID is still pending after the CI wait window. Resume polling with the run id shown above."
            else
              echo "::error::TestSprite test $TEST_ID failed with exit code $CODE"
              FAILED=1
            fi

            echo "::endgroup::"
          done < <(printf '%s\n' "$RAW_TEST_IDS" | tr ', ' '\n\n')

          exit "$FAILED"
